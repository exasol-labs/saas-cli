version: "3"

vars:
  BINARY: bin/exasol-saas
  VERSION: "0.1.0"

tasks:
  build:
    desc: Build the CLI binary to bin/
    cmds:
      - mkdir -p bin
      - go build -ldflags "-X 'github.com/exasol-labs/saas-cli/internal/cmd.Version={{.VERSION}}'" -o {{.BINARY}} ./cmd/exasol-saas

  test:
    desc: Run unit and integration tests
    cmds:
      - go test ./...

  lint:
    desc: Run go vet and gofmt check
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)"

  coverage:
    desc: Generate HTML coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  build-all:
    desc: Cross-compile binaries for all platforms into dist/
    vars:
      LDFLAGS: "-X 'github.com/exasol-labs/saas-cli/internal/cmd.Version={{.VERSION}}'"
    cmds:
      - mkdir -p dist
      - GOOS=darwin  GOARCH=amd64  go build -ldflags "{{.LDFLAGS}}" -o dist/exasol-saas-darwin-amd64     ./cmd/exasol-saas
      - GOOS=darwin  GOARCH=arm64  go build -ldflags "{{.LDFLAGS}}" -o dist/exasol-saas-darwin-arm64     ./cmd/exasol-saas
      - GOOS=linux   GOARCH=amd64  go build -ldflags "{{.LDFLAGS}}" -o dist/exasol-saas-linux-amd64      ./cmd/exasol-saas
      - GOOS=linux   GOARCH=arm64  go build -ldflags "{{.LDFLAGS}}" -o dist/exasol-saas-linux-arm64      ./cmd/exasol-saas
      - GOOS=windows GOARCH=amd64  go build -ldflags "{{.LDFLAGS}}" -o dist/exasol-saas-windows-amd64.exe ./cmd/exasol-saas

  release:
    desc: Create a GitHub release for v{{.VERSION}} and upload binaries
    cmds:
      - task: lint
      - task: test
      - task: build-all
      - gh release create v{{.VERSION}} dist/* --title "v{{.VERSION}}" --generate-notes
